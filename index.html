<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css" />
    <title>Clicker</title>
</head>

<body>
    <div id="tutorial-overlay" class="tutorial-overlay">
        <div class="dialogue-box">
            <div class="npc-container">
                <div class="npc-avatar">🧙‍♂️</div>
                <div class="npc-name">Gromir (Old Miner)</div>
            </div>
            <div class="speech-bubble">
                <p id="tutorial-text">Sigh... Well, someone finally showed up. Listen closely, young man, because I
                    won't repeat myself</p>
                <span class="click-prompt">Click to countinue...</span>
            </div>
        </div>
    </div>
    <div class="gem-counter">Gems : 0</div>
    <div class="GemRock">
        <img src="media/Gem-Rock.png" width="400" height="300" usemap="#rock-map" alt="Gem Rock" />

        <map name="rock-map">
            <area shape="poly"
                coords="120,30, 220,30, 290,45, 325,100, 365,150, 370,210, 350,250, 270,265, 215,285, 120,255, 40,210, 30,150, 70,80"
                id="entire-rock">
        </map>
    </div>
    <div class="upgrades-panel">
        <!-- 1. Miner -->
        <div class="miner-upgrades">
            <img src="media/miner-upgrade.png" width="50" height="50" class="upgrade-icon" alt="Miner">
            <button class="miner-upgrade">Miner</button>
            <div class="miner-price"></div>
            <div class="miner-lvl"></div>
        </div>

        <!-- 2. Quarry -->
        <div class="quarry-upgrades">
            <img src="media/quarry-upgrade.png" width="50" height="50" class="upgrade-icon" alt="Quarry">
            <button class="quarry-upgrade">Quarry</button>
            <div class="quarry-price"></div>
            <div class="quarry-lvl"></div>
        </div>

        <!-- 3. Catapult -->
        <div class="catapult-upgrades">
            <img src="media/Catapult-upgrade.jpg" width="50" height="50" class="upgrade-icon" alt="Catapult">
            <button class="catapult-upgrade">Catapult</button>
            <div class="catapult-price"></div>
            <div class="catapult-lvl"></div>
        </div>

        <!-- 4. Iron Hammer Order -->
        <div class="iron_hammers-upgrades">
            <img src="media/iron_hammers.png" width="50" height="50" class="upgrade-icon"
                alt="Iron Hammer Order">
            <button class="iron_hammers-upgrade">Iron Hammer Order</button>
            <div class="iron_hammers-price"></div>
            <div class="iron_hammers-lvl"></div>
        </div>

        <!-- 5. Mine Inspector -->
        <div class="mine_inspector-upgrades">
            <img src="media/mine_inspector.png" width="50" height="50" class="upgrade-icon"
                alt="Mine Inspector">
            <button class="mine_inspector-upgrade">Mine Inspector</button>
            <div class="mine_inspector-price"></div>
            <div class="mine_inspector-lvl"></div>
        </div>

        <!-- 6. Runic Golem -->
        <div class="runic_golem-upgrades">
            <img src="media/runic_golem.png" width="50" height="50" class="upgrade-icon" alt="Runic Golem">
            <button class="runic_golem-upgrade">Runic Golem</button>
            <div class="runic_golem-price"></div>
            <div class="runic_golem-lvl"></div>
        </div>

        <!-- 7. Alchemic -->
        <div class="alchemic-upgrades">
            <img src="media/alchemic-upgrade.png" width="50" height="50" class="upgrade-icon" alt="Alchemic">
            <button class="alchemic-upgrade">Alchemic</button>
            <div class="alchemic-price"></div>
            <div class="alchemic-lvl"></div>
        </div>

        <!-- 8. Earth Mage -->
        <div class="earth_mage-upgrades">
            <img src="media/earth_mage-upgrade.png" width="50" height="50" class="upgrade-icon" alt="Earth Mage">
            <button class="earth_mage-upgrade">Earth Mage</button>
            <div class="earth_mage-price"></div>
            <div class="earth_mage-lvl"></div>
        </div>

        <!-- 9. Deep Shaft -->
        <div class="deep_shaft-upgrades">
            <img src="media/deep_shaft-upgrade.png" width="50" height="50" class="upgrade-icon" alt="Deep Shaft">
            <button class="deep_shaft-upgrade">Deep Shaft</button>
            <div class="deep_shaft-price"></div>
            <div class="deep_shaft-lvl"></div>
        </div>

        <!-- 10. Gem Tower -->
        <div class="gem_tower-upgrades">
            <img src="media/gem_tower-upgrade.png" width="50" height="50" class="upgrade-icon" alt="Gem Tower">
            <button class="gem_tower-upgrade">Gem Tower</button>
            <div class="gem_tower-price"></div>
            <div class="gem_tower-lvl"></div>
        </div>
    </div>
    <div class="save-panel">
        <button id="audio-toggle">🔊 Music: ON</button>
        <button id="save-btn">Save Game</button>
        <button id="load-btn">Load Game</button>

        <input type="file" id="file-input" accept=".json" style="display: none;">
    </div>
    <div class="store-panel">
        <div class="store-title">Store</div>
        <div class="store-subheader">UPGRADES</div>
        <div class="store-grid">
            <!-- Manual Click Tool Multiplier -->
            <div class="store-item sharper_pickaxe-shop" data-upgrade="sharper_pickaxe">
                <div class="store-icon">⛏️</div>
                <div class="store-lvl">0</div>
            </div>
            <!--  Ulepszenie dla kursora-->
            <div class="store-item lucky_gauntlet-shop" data-upgrade="lucky_gauntlet">
                <div class="store-icon">⚡</div>
                <div class="store-lvl">0</div>
            </div>
            <!-- Miner Multiplier -->
            <div class="store-item miner_gear-shop" data-upgrade="miner_gear">
                <div class="store-icon">⚙️</div>
                <div class="store-lvl">0</div>
            </div>

            <!-- Archer Multiplier -->
            <div class="store-item archer_training-shop" data-upgrade="archer_training">
                <div class="store-icon">🏹</div>
                <div class="store-lvl">0</div>
            </div>

            <!-- Knight Multiplier -->
            <div class="store-item knight_armory-shop" data-upgrade="knight_armory">
                <div class="store-icon">⚔️</div>
                <div class="store-lvl">0</div>
            </div>

            <!-- Wizard Multiplier -->
            <div class="store-item wizard_grimoire-shop" data-upgrade="wizard_grimoire">
                <div class="store-icon">📖</div>
                <div class="store-lvl">0</div>
            </div>

            <!-- Golem Multiplier -->
            <div class="store-item golem_core-shop" data-upgrade="golem_core">
                <div class="store-icon">💎</div>
                <div class="store-lvl">0</div>
            </div>

            <!-- Lord Commander Multiplier -->
            <div class="store-item commander_tactic-shop" data-upgrade="commander_tactic">
                <div class="store-icon">👑</div>
                <div class="store-lvl">0</div>
            </div>

            <!-- Remaining aesthetic grid slots (Completes standard 10-slot row arrays) -->
            <div class="store-item empty-slot">🔒</div>
            <div class="store-item empty-slot">🔒</div>
            <div class="store-item empty-slot">🔒</div>
        </div>
    </div>

    <!-- Inteligentny, pływający popup z opisem przedmiotu -->
    <div id="store-tooltip" class="store-tooltip"></div>
    <script src="script.js"></script>
</body>

</html>
