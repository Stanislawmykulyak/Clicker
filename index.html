<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css"/>
    <title>Clicker</title>
</head>
<body>
    <div class="gem-counter">Gems : 0</div>
    <div class="GemRock"> 
    <img src="media/Gem-Rock.png" width="400" height="300" usemap="#rock-map" alt="Gem Rock" />
    
        <map name="rock-map">
            <area shape="poly" coords="120,30, 220,30, 290,45, 325,100, 365,150, 370,210, 350,250, 270,265, 215,285, 120,255, 40,210, 30,150, 70,80" id="entire-rock">
        </map>
    </div>
    <div class="upgrades-panel">
        <div class="miner-upgrades">
            <img src="media/miner-upgrade.png" width="50" height="50" class="upgrade-icon" alt="Miner">
            <button class="miner-upgrade">Miner Upgrade</button>
            <div class="miner-price"></div>
            <div class="miner-lvl"></div>
        </div>
        
        <div class="archer-upgrades">
            <img src="media/archer-upgrade.png" width="50" height="50" class="upgrade-icon" alt="Archer">
            <button class="archer-upgrade"> Archer Upgrade</button>
            <div class="archer-price"></div>
            <div class="archer-lvl"></div>
        </div>

        <div class="knight-upgrades">
            <img src="media/knight-upgrade.png" width="50" height="50" class="upgrade-icon" alt="Knight">
            <button class="knight-upgrade"> Knight Upgrade</button>
            <div class="knight-price"></div>
            <div class="knight-lvl"></div>
        </div>
    </div>
    
    <div class="save-panel">
        <button id="audio-toggle">🔊 Music: ON</button>
        <button id="save-btn">Save Game</button>
        <button id="load-btn">Load Game</button>
    
        <input type="file" id="file-input" accept=".json" style="display: none;">
    </div>
    <script src="script.js"></script>
</body>
</html>
