<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css" />
    <title>Clicker</title>
</head>

<body>
    <div id="tutorial-overlay" class="tutorial-overlay">
        <div class="dialogue-box">
            <div class="npc-container">
                <div class="npc-avatar">🧙‍♂️</div>
                <div class="npc-name">Gromir (Old Miner)</div>
            </div>
            <div class="speech-bubble">
                <p id="tutorial-text">Sigh... Well, someone finally showed up. Listen closely, young man, because I
                    won't repeat myself</p>
                <span class="click-prompt">Click to countinue...</span>
            </div>
        </div>
    </div>
    <div class="gem-counter">Gems : 0</div>
    <div class="GemRock">
        <img src="media/Gem-Rock.png" width="400" height="300" usemap="#rock-map" alt="Gem Rock" />

        <map name="rock-map">
            <area shape="poly"
                coords="120,30, 220,30, 290,45, 325,100, 365,150, 370,210, 350,250, 270,265, 215,285, 120,255, 40,210, 30,150, 70,80"
                id="entire-rock">
        </map>
    </div>
    <div class="upgrades-panel">
        <div class="miner-upgrades">
            <img src="media/miner-upgrade.png" width="50" height="50" class="upgrade-icon" alt="Miner">
            <button class="miner-upgrade">Miner </button>
            <div class="miner-price"></div>
            <div class="miner-lvl"></div>
        </div>

        <div class="archer-upgrades">
            <img src="media/archer-upgrade.png" width="50" height="50" class="upgrade-icon" alt="Archer">
            <button class="archer-upgrade"> Archer </button>
            <div class="archer-price"></div>
            <div class="archer-lvl"></div>
        </div>

        <div class="knight-upgrades">
            <img src="media/knight-upgrade.png" width="50" height="50" class="upgrade-icon" alt="Knight">
            <button class="knight-upgrade"> Knight </button>
            <div class="knight-price"></div>
            <div class="knight-lvl"></div>
        </div>
        <div class="wizard-upgrades">
            <img src="media/wizard-upgrade.jpg" width="50" height="50" class="upgrade-icon" alt="Wizard">
            <button class="wizard-upgrade">Wizard </button>
            <div class="wizard-price"></div>
            <div class="wizard-lvl"></div>
        </div>

        <div class="golem-upgrades">
            <img src="media/golem-upgrade.jpg" width="50" height="50" class="upgrade-icon" alt="Earth Golem">
            <button class="golem-upgrade">Earth Golem</button>
            <div class="golem-price"></div>
            <div class="golem-lvl"></div>
        </div>

        <div class="commander-upgrades">
            <img src="media/commander-upgrade.jpg" width="50" height="50" class="upgrade-icon" alt="Lord Commander">
            <button class="commander-upgrade">Lord Commander</button>
            <div class="commander-price"></div>
            <div class="commander-lvl"></div>
        </div>
    </div>
    <div class="save-panel">
        <button id="audio-toggle">🔊 Music: ON</button>
        <button id="save-btn">Save Game</button>
        <button id="load-btn">Load Game</button>

        <input type="file" id="file-input" accept=".json" style="display: none;">
    </div>
    <div class="store-panel">
        <div class="store-title">Store</div>
        <div class="store-subheader">UPGRADES</div>
        <div class="store-grid">
            <!-- Manual Click Tool Multiplier -->
            <div class="store-item sharper_pickaxe-shop" data-upgrade="sharper_pickaxe">
                <div class="store-icon">⛏️</div>
                <div class="store-lvl">0</div>
            </div>
            <!--  Ulepszenie dla kursora-->
            <div class="store-item lucky_gauntlet-shop" data-upgrade="lucky_gauntlet">
                <div class="store-icon">⚡</div>
                <div class="store-lvl">0</div>
            </div>
            <!-- Miner Multiplier -->
            <div class="store-item miner_gear-shop" data-upgrade="miner_gear">
                <div class="store-icon">⚙️</div>
                <div class="store-lvl">0</div>
            </div>

            <!-- Archer Multiplier -->
            <div class="store-item archer_training-shop" data-upgrade="archer_training">
                <div class="store-icon">🏹</div>
                <div class="store-lvl">0</div>
            </div>

            <!-- Knight Multiplier -->
            <div class="store-item knight_armory-shop" data-upgrade="knight_armory">
                <div class="store-icon">⚔️</div>
                <div class="store-lvl">0</div>
            </div>

            <!-- Wizard Multiplier -->
            <div class="store-item wizard_grimoire-shop" data-upgrade="wizard_grimoire">
                <div class="store-icon">📖</div>
                <div class="store-lvl">0</div>
            </div>

            <!-- Golem Multiplier -->
            <div class="store-item golem_core-shop" data-upgrade="golem_core">
                <div class="store-icon">💎</div>
                <div class="store-lvl">0</div>
            </div>

            <!-- Lord Commander Multiplier -->
            <div class="store-item commander_tactic-shop" data-upgrade="commander_tactic">
                <div class="store-icon">👑</div>
                <div class="store-lvl">0</div>
            </div>

            <!-- Remaining aesthetic grid slots (Completes standard 10-slot row arrays) -->
            <div class="store-item empty-slot">🔒</div>
            <div class="store-item empty-slot">🔒</div>
            <div class="store-item empty-slot">🔒</div>
        </div>
    </div>

    <!-- Inteligentny, pływający popup z opisem przedmiotu -->
    <div id="store-tooltip" class="store-tooltip"></div>
    <script src="script.js"></script>
</body>

</html>
