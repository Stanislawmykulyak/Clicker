<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kingdom Commander - Strategy RPG</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- GÓRNY PASEK ZASOBÓW -->
    <header id="resources-bar">
        <div class="resource">🎖 CC: <span id="res-cc">100</span></div>
        <div class="resource" style="color: #95a5a6;">⚙️ Żelazo: <span id="res-iron">0</span></div>
        <div class="resource" style="color: #2ecc71;">🌿 Zioła: <span id="res-herbs">0</span></div>
    </header>

    <!-- GŁÓWNY KONTENER GRY -->
    <div id="game-container">
        <!-- NAWIGACJA / SIDEBAR -->
        <nav id="navigation-sidebar">
            <button class="nav-btn active" data-target="map-screen">🗺 Mapa Świata</button>
            <button class="nav-btn" data-target="barracks-screen">⚔ Koszary i Frakcje</button>
            <button class="nav-btn" data-target="missions-screen">📜 Tawerna i Misje</button>
        </nav>

        <!-- EKRAN ROZGRYWKI -->
        <main id="game-viewport">
            <!-- Tutaj JS będzie wstrzykiwał odpowiednie ekrany -->
            <div id="active-screen"></div>
        </main>
    </div>

    <div id="rpg-dialog-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.75); z-index: 9999; justify-content: center; align-items: center; padding: 20px;">
        <div id="rpg-dialog-box" style="background: #231a14; border: 3px solid #ffd700; border-radius: 10px; width: 100%; max-width: 500px; padding: 25px; box-shadow: 0 0 25px rgba(0,0,0,0.8), inset 0 0 15px rgba(0,0,0,0.5); text-align: center;">
            <h2 id="rpg-dialog-title" style="margin-top: 0; font-size: 1.6rem; color: #ffd700; border-bottom: 2px solid #4a3525; padding-bottom: 10px;"></h2>
            <p id="rpg-dialog-text" style="font-family: 'Cinzel'; color: #ebd6b3; margin: 20px 0; line-height: 1.6; font-size: 1rem;"></p>
            <div id="rpg-dialog-options" style="display: flex; flex-direction: column; gap: 12px; margin-top: 20px;"></div>
        </div>
    </div>

    <!-- SKRYPTY (Rozbite modułowo) -->
    <script src="js/state.js"></script>
    <script src="js/engine.js"></script>
    <script src="js/ui.js"></script>
</body>
</html>
